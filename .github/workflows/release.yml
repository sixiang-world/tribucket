name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (semver, e.g. 2.0.0)'
        required: true
        default: '3.0.0'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.output }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            output: tribucket-linux-amd64
            debug_output: tribucket-linux-amd64-debug
          - os: ubuntu-24.04-arm
            output: tribucket-linux-arm64
            debug_output: tribucket-linux-arm64-debug
          - os: macos-14
            output: tribucket-darwin-arm64
            debug_output: tribucket-darwin-arm64-debug
          - os: windows-latest
            output: tribucket-windows-amd64.exe
            debug_output: tribucket-windows-amd64-debug.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"   # pin to minor version; update regularly
      - run: bun install
      - run: bun build src/index.ts --compile --outfile ${{ matrix.output }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}
      - run: bun build src/index.ts --compile --define DEBUG_BUILD=true --outfile ${{ matrix.debug_output }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.debug_output }}
          path: ${{ matrix.debug_output }}

  # macOS Intel — only on manual workflow_dispatch (macOS-13 runner scarce)
  build-darwin-amd64:
    if: github.event_name == 'workflow_dispatch'
    name: Build tribucket-darwin-amd64
    runs-on: macos-13
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"   # pin to minor version; update regularly
      - run: bun install
      - run: bun build src/index.ts --compile --outfile tribucket-darwin-amd64
      - uses: actions/upload-artifact@v4
        with:
          name: tribucket-darwin-amd64
          path: tribucket-darwin-amd64
      - run: bun build src/index.ts --compile --define DEBUG_BUILD=true --outfile tribucket-darwin-amd64-debug
      - uses: actions/upload-artifact@v4
        with:
          name: tribucket-darwin-amd64-debug
          path: tribucket-darwin-amd64-debug

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la dist/

      - name: Compute SHA256 checksums
        run: |
          cd dist
          sha256sum * | tee ../sha256sums.txt

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine previous tag
        id: prev_tag
        run: |
          git fetch --tags --force 2>/dev/null || true
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "tag=$PREV" >> "$GITHUB_OUTPUT"

      - name: Build release body
        id: body
        run: |
          # Build the release notes into a markdown file, then emit as a
          # multiline GITHUB_OUTPUT value. Using a file (not a heredoc) keeps
          # the YAML-friendly indentation while remaining valid bash.
          {
            printf '%s\n' "## tribucket ${{ steps.version.outputs.tag }}"
            printf '\n'
            printf '%s\n' "See [commits](https://github.com/sixiang-world/tribucket/compare/${{ steps.prev_tag.outputs.tag }}...${{ steps.version.outputs.tag }}) for details."
            printf '\n'
            printf '%s\n' "### Platform binaries"
            printf '%s\n' "- \`tribucket-linux-amd64\` — Linux x86_64"
            printf '%s\n' "- \`tribucket-linux-arm64\` — Linux ARM64"
            printf '%s\n' "- \`tribucket-darwin-arm64\` — macOS Apple Silicon"
            printf '%s\n' "- \`tribucket-windows-amd64.exe\` — Windows x86_64"
            if [ -f dist/tribucket-darwin-amd64 ]; then
              printf '%s\n' "- \`tribucket-darwin-amd64\` — macOS Intel"
            fi
            printf '\n'
            printf '%s\n' "### Debug binaries (verbose always on)"
            printf '%s\n' "- \`tribucket-linux-amd64-debug\` — Linux x86_64"
            printf '%s\n' "- \`tribucket-linux-arm64-debug\` — Linux ARM64"
            printf '%s\n' "- \`tribucket-darwin-arm64-debug\` — macOS Apple Silicon"
            printf '%s\n' "- \`tribucket-windows-amd64-debug.exe\` — Windows x86_64"
            if [ -f dist/tribucket-darwin-amd64-debug ]; then
              printf '%s\n' "- \`tribucket-darwin-amd64-debug\` — macOS Intel"
            fi
            printf '\n'
            printf '%s\n' "### What's new (${{ steps.version.outputs.tag }})"
            # Extract CHANGELOG entry for this version
            VERSION_NUM="${{ steps.version.outputs.version }}"
            if [ -f CHANGELOG.md ]; then
              # Extract CHANGELOG entry for this version, excluding header line
              awk -v ver="$VERSION_NUM" '
                /^## v[0-9]/ { if (index($0, "v" ver) > 0) { found = 1; next } else if (found) exit }
                found { print }
              ' CHANGELOG.md | head -50
            fi
          } > /tmp/release_body.md

          # Emit as a multiline GITHUB_OUTPUT value.
          {
            echo "body<<EOF"
            cat /tmp/release_body.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.body.outputs.body }}
          files: |
            dist/*
            sha256sums.txt
          draft: false
          prerelease: false
