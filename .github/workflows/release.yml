name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (semver, e.g. 2.0.0)'
        required: true
        default: '3.0.0'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.output }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            output: tribucket-linux-amd64
          - os: ubuntu-24.04-arm
            output: tribucket-linux-arm64
          - os: macos-14
            output: tribucket-darwin-arm64
          - os: windows-latest
            output: tribucket-windows-amd64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun build src/index.ts --compile --outfile ${{ matrix.output }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}

  # macOS Intel — only on manual workflow_dispatch (macOS-13 runner scarce)
  build-darwin-amd64:
    if: github.event_name == 'workflow_dispatch'
    name: Build tribucket-darwin-amd64
    runs-on: macos-13
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun build src/index.ts --compile --outfile tribucket-darwin-amd64
      - uses: actions/upload-artifact@v4
        with:
          name: tribucket-darwin-amd64
          path: tribucket-darwin-amd64

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la dist/

      - name: Compute SHA256 checksums
        run: |
          cd dist
          sha256sum * | tee ../sha256sums.txt

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release body
        id: body
        run: |
          # Build the release notes into a markdown file, then emit as a
          # multiline GITHUB_OUTPUT value. Using a file (not a heredoc) keeps
          # the YAML-friendly indentation while remaining valid bash.
          {
            printf '%s\n' "## tribucket ${{ steps.version.outputs.tag }}"
            printf '\n'
            printf '%s\n' "See [commits](https://github.com/sixiang-world/tribucket/compare/v3.1.0...${{ steps.version.outputs.tag }}) for details."
            printf '\n'
            printf '%s\n' "### Platform binaries"
            printf '%s\n' "- \`tribucket-linux-amd64\` — Linux x86_64"
            printf '%s\n' "- \`tribucket-linux-arm64\` — Linux ARM64"
            printf '%s\n' "- \`tribucket-darwin-arm64\` — macOS Apple Silicon"
            printf '%s\n' "- \`tribucket-windows-amd64.exe\` — Windows x86_64"
            if [ -f dist/tribucket-darwin-amd64 ]; then
              printf '%s\n' "- \`tribucket-darwin-amd64\` — macOS Intel"
            fi
            printf '\n'
            printf '%s\n' "### What's new (v3.2.0)"
            printf '%s\n' "Cross-platform stability overhaul — 12 blocking/high-risk bugs fixed,"
            printf '%s\n' "verified end-to-end on Windows + Linux (WSL Ubuntu 24.04):"
            printf '\n'
            printf '%s\n' "- **Download URLs** no longer hardcode a \`v\` tag prefix (fixed \`jq-1.8.1\`, \`15.1.0\`-style tags 404'ing)."
            printf '%s\n' "- **Asset resolution**: \`asset_pattern\` is now matched against the real release asset list (literal / glob \`*\` / suffix)."
            printf '%s\n' "- **Linux tar extraction**: removed the unsupported \`--no-absolute-names\` flag that crashed every \`.tar.*\` install."
            printf '%s\n' "- **Windows binaries**: installed as \`<name>.exe\`; version detection probes the \`.exe\` path."
            printf '%s\n' "- **\`--json\`** output for \`check\`/\`list\` fixed (was shadowed by the global option)."
            printf '%s\n' "- **\`--all\`** iterates by package name, not repo key."
            printf '%s\n' "- **Version comparison** via \`versionFromTag\`; cached remote versions self-heal on read."
            printf '%s\n' "- **HTTP resilience**: 5 retries with jittered backoff; 403/429 retried too."
            printf '%s\n' "- **Post-update probe** retries and skips the unreliable Windows \`X_OK\` check (no more spurious \"Version mismatch\")."
            printf '\n'
            printf '%s\n' "Tests: unit 19/19, Linux end-to-end 12/12, Windows end-to-end 9/9."
          } > /tmp/release_body.md

          # Emit as a multiline GITHUB_OUTPUT value.
          {
            echo "body<<EOF"
            cat /tmp/release_body.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.body.outputs.body }}
          files: |
            dist/*
            sha256sums.txt
          draft: false
          prerelease: false
