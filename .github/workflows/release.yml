name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (semver, e.g. 2.0.0)'
        required: true
        default: '3.0.0'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.output }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            output: tribucket-linux-amd64
          - os: ubuntu-24.04-arm
            output: tribucket-linux-arm64
          - os: macos-14
            output: tribucket-darwin-arm64
          - os: windows-latest
            output: tribucket-windows-amd64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun build src/index.ts --compile --outfile ${{ matrix.output }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}

  # macOS Intel — only on manual workflow_dispatch (macOS-13 runner scarce)
  build-darwin-amd64:
    if: github.event_name == 'workflow_dispatch'
    name: Build tribucket-darwin-amd64
    runs-on: macos-13
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun build src/index.ts --compile --outfile tribucket-darwin-amd64
      - uses: actions/upload-artifact@v4
        with:
          name: tribucket-darwin-amd64
          path: tribucket-darwin-amd64

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la dist/

      - name: Compute SHA256 checksums
        run: |
          cd dist
          sha256sum * | tee ../sha256sums.txt

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release body
        id: body
        run: |
          BODY=$(cat <<'EOB'
          ## tribucket ${{ steps.version.outputs.tag }}

          See [commits](https://github.com/sixiang-world/tribucket/compare/v3.1.0...${{ steps.version.outputs.tag }}) for details.

          ### Platform binaries
          - `tribucket-linux-amd64` — Linux x86_64
          - `tribucket-linux-arm64` — Linux ARM64
          - `tribucket-darwin-arm64` — macOS Apple Silicon
          - `tribucket-windows-amd64.exe` — Windows x86_64

          ### What's new (v3.2.0)
          Cross-platform stability overhaul — 12 blocking/high-risk bugs fixed,
          verified end-to-end on Windows + Linux (WSL Ubuntu 24.04):

          - **Download URLs** no longer hardcode a `v` tag prefix (fixed
            `jq-1.8.1`, `15.1.0`-style tags 404'ing).
          - **Asset resolution**: `asset_pattern` is now matched against the
            real release asset list (literal / glob `*` / suffix).
          - **Linux tar extraction**: removed the unsupported
            `--no-absolute-names` flag that crashed every `.tar.*` install.
          - **Windows binaries**: installed as `<name>.exe`; version detection
            probes the `.exe` path.
          - **`--json`** output for `check`/`list` fixed (was shadowed by the
            global option).
          - **`--all`** iterates by package name, not repo key.
          - **Version comparison** via `versionFromTag`; cached remote versions
            self-heal on read.
          - **HTTP resilience**: 5 retries with jittered backoff; 403/429
            retried too.
          - **Post-update probe** retries and skips the unreliable Windows
            `X_OK` check (no more spurious "Version mismatch").

          Tests: unit 19/19, Linux end-to-end 12/12, Windows end-to-end 9/9.
          EOB
          )
          if [ -f dist/tribucket-darwin-amd64 ]; then
            BODY="$BODY"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.body.outputs.body }}
          files: |
            dist/*
            sha256sums.txt
          draft: false
          prerelease: false
\n'"- \`tribucket-darwin-amd64\` — macOS Intel"
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.body.outputs.body }}
          files: |
            dist/*
            sha256sums.txt
          draft: false
          prerelease: false
