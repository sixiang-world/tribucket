name: Generate Formula & Bucket

on:
  push:
    branches: [main]
    paths: ['packages/**']
  schedule:
    - cron: '17 */6 * * *'  # Every 6 hours at :17
  workflow_dispatch:
  workflow_run:
    workflows: ["Build & Release"]
    types: [completed]

permissions:
  contents: write

jobs:
  generate:
    if: |
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install aria2
        run: sudo apt-get update && sudo apt-get install -y aria2

      - name: Generate Formula and Bucket
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -u scripts/generate.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet Formula/ bucket/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ bucket/
          # Build a descriptive commit message
          CHANGED=$(git diff --cached --name-only | sed 's|Formula/\|bucket/||; s|\.rb\|\.json||' | sort -u | tr '\n' ', ' | sed 's/,$//')
          git commit -m "chore: update Formula/Bucket ($CHANGED)"
          git push
